services:
    server:
        image: ghcr.io/ashelto6/nodeapp-server:dev
        build:
            target: dev
        volumes:
            - ./server:/server
            - /server/node_modules

    nginx:
        image: ghcr.io/ashelto6/nodeapp-nginx:dev
        build:
            target: dev

    client:
        build:
            context: ./client
            dockerfile: Dockerfile
            target: dev
        container_name: ${CLIENT_HOST}
        env_file: .env
        ports:
            - ${CLIENT_PORT}:${CLIENT_PORT}
        volumes:
            - ./client:/client
            - /client/node_modules
