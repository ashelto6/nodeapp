services:
    server:
        image: ghcr.io/ashelto6/nodeapp-server:dev
        build:
            target: dev
        # Direct host access to the API, dev-only (issue #110): prod's
        # docker-compose.yaml no longer publishes this port at all, since
        # nginx is meant to be the only publicly reachable service.
        ports:
            - ${SERVER_PORT}:${SERVER_PORT}
        volumes:
            - ./server:/server
            - /server/node_modules

    nginx:
        image: ghcr.io/ashelto6/nodeapp-nginx:dev
        build:
            target: dev
        # Dev template's / location proxies to the client dev server, so
        # nginx needs these two on top of the base environment: block (#111).
        environment:
            CLIENT_HOST: ${CLIENT_HOST}
            CLIENT_PORT: ${CLIENT_PORT}

    client:
        build:
            context: ./client
            dockerfile: Dockerfile
            target: dev
        container_name: ${CLIENT_HOST}
        environment:
            CLIENT_PORT: ${CLIENT_PORT}
            SERVER_HOST: ${SERVER_HOST}
            SERVER_PORT: ${SERVER_PORT}
        ports:
            - ${CLIENT_PORT}:${CLIENT_PORT}
        volumes:
            - ./client:/client
            - /client/node_modules
