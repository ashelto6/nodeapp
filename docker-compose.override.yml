services:
    server:
        image: ghcr.io/ashelto6/nodeapp-server:dev
        build:
            target: dev
        # Direct host access to the API, dev-only (issue #110): prod's
        # docker-compose.yaml no longer publishes this port at all, since
        # nginx is meant to be the only publicly reachable service.
        ports:
            - ${SERVER_PORT}:${SERVER_PORT}
        volumes:
            - ./server:/server
            - /server/node_modules

    nginx:
        image: ghcr.io/ashelto6/nodeapp-nginx:dev
        build:
            target: dev

    client:
        build:
            context: ./client
            dockerfile: Dockerfile
            target: dev
        container_name: ${CLIENT_HOST}
        env_file: .env
        ports:
            - ${CLIENT_PORT}:${CLIENT_PORT}
        volumes:
            - ./client:/client
            - /client/node_modules
