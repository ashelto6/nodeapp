name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t nodeapp-server:ci ./server

      - name: Build nginx image
        run: docker build -t nodeapp-nginx:ci ./nginx
