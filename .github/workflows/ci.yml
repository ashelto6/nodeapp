name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Server tests (with coverage gate)
        working-directory: server
        run: |
          npm ci
          npm run test:coverage

      - name: Client tests (with coverage gate)
        working-directory: client
        run: |
          npm ci
          npm run test:coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      # eslint enforces code quality; prettier --check enforces formatting.
      # Both scripts fail on any violation (lint uses --max-warnings=0), so a
      # style or quality regression fails the PR the same way a test would.
      - name: Server lint + format check
        working-directory: server
        run: |
          npm ci
          npm run lint
          npm run format:check

      - name: Client lint + format check
        working-directory: client
        run: |
          npm ci
          npm run lint
          npm run format:check

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      # audit-level=high: moderate/low advisories are common and often have
      # no fix available yet, so gating on them would make this check cry
      # wolf. High/critical is the bar worth blocking a merge over.
      - name: Server dependency audit
        working-directory: server
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Client dependency audit
        working-directory: client
        run: |
          npm ci
          npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build server image
        run: docker build -t nodeapp-server:ci --target prod ./server

      - name: Build client image
        run: docker build -t nodeapp-client:ci --target build ./client

      - name: Build nginx image
        run: docker build -t nodeapp-nginx:ci -f nginx/Dockerfile --target prod .
