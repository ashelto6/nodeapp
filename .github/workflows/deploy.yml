name: Build, Push, and Deploy

on:
  push:
    branches: [main]
    # Deploy only when a runtime path changes (issue #76). Without this,
    # a docs-only merge triggered a full rebuild + redeploy.
    #
    # This is an ALLOWLIST, chosen deliberately over `paths-ignore`: a push
    # that matches NONE of these paths is skipped, so the default for any
    # new/unmatched path is "don't deploy" -- matching the "deploy only when
    # runtime changed" intent. The cost is that this list must be kept in
    # sync as the tree grows: a new runtime directory that isn't listed here
    # will NOT ship. When adding runtime paths, add them here too.
    #
    # `paths` AND `branches` combine: a push must be to `main` AND touch one
    # of these. A push touching both docs and a runtime path still deploys
    # (any single match triggers). deploy.yml is not a required check, so a
    # skipped run never blocks a merge.
    paths:
      - 'server/**'   # backend source, Dockerfile, and package-lock.json
      - 'client/**'   # frontend source, Dockerfile, lockfile -- reaches
                      # prod via the nginx image, which builds the client
      - 'nginx/**'    # reverse-proxy config + Dockerfile
      # Root `.dockerignore` governs the nginx build context (`context: .`),
      # so a change to it can alter the shipped nginx image.
      - '.dockerignore'
      - 'docker-compose.yaml'          # prod compose the deploy runs (`-f`)
      # Dev-only override; prod deploy never applies it (`-f docker-compose.yaml`
      # only). Listed conservatively -- over-deploying on a dev-compose edit is
      # harmless; drop this line if strict "prod-runtime only" is preferred.
      - 'docker-compose.override.yml'
      - '.env.example'                 # env contract shipped with the image
      - '.github/workflows/deploy.yml' # the deploy pipeline itself

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            context: ./server
            dockerfile: server/Dockerfile
            target: prod
          - name: nginx
            context: .
            dockerfile: nginx/Dockerfile
            target: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nodeapp-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nodeapp-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.LINODE_APP_DIR }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yaml pull
            docker compose -f docker-compose.yaml up -d --remove-orphans
            # Post-deploy health gate (issue #52): `up -d` exits 0 once
            # containers are created, even if the app inside is broken.
            # /api/health returns 200 only when fully healthy (503 when
            # degraded), so the status code alone is the contract here.
            # Read only the one needed value -- never source .env as
            # shell (issue #60: compose parses .env more leniently than
            # bash; sourcing broke on a value bash couldn't parse).
            # tr strips CR so a Windows-edited .env can't poison the URL
            # (same failure class as issue #60).
            NGINX_PORT=$(grep -m1 '^NGINX_PORT=' .env | cut -d= -f2 | tr -d '\r')
            for i in $(seq 1 12); do
              # --max-time caps a hung connection so one stuck attempt
              # can't stall the gate past its 60s budget.
              if curl -sf --max-time 5 -o /dev/null "http://localhost:${NGINX_PORT}/api/health"; then
                echo "Health check passed."
                # Cleanup must never fail a healthy deploy (set -e).
                docker image prune -f || true
                exit 0
              fi
              sleep 5
            done
            echo "Health check FAILED: app not healthy within 60s of deploy."
            docker compose -f docker-compose.yaml ps
            docker compose -f docker-compose.yaml logs --tail 30 server
            exit 1
