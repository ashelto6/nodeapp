name: Build, Push, and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            context: ./server
            dockerfile: server/Dockerfile
            target: prod
          - name: nginx
            context: .
            dockerfile: nginx/Dockerfile
            target: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nodeapp-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/nodeapp-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.LINODE_APP_DIR }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yaml pull
            docker compose -f docker-compose.yaml up -d --remove-orphans
            # Post-deploy health gate (issue #52): `up -d` exits 0 once
            # containers are created, even if the app inside is broken.
            # /api/health returns 200 only when fully healthy (503 when
            # degraded), so the status code alone is the contract here.
            # Read only the one needed value -- never source .env as
            # shell (issue #60: compose parses .env more leniently than
            # bash; sourcing broke on a value bash couldn't parse).
            NGINX_PORT=$(grep -m1 '^NGINX_PORT=' .env | cut -d= -f2)
            for i in $(seq 1 12); do
              if curl -sf -o /dev/null "http://localhost:${NGINX_PORT}/api/health"; then
                echo "Health check passed."
                docker image prune -f
                exit 0
              fi
              sleep 5
            done
            echo "Health check FAILED: app not healthy within 60s of deploy."
            docker compose -f docker-compose.yaml ps
            docker compose -f docker-compose.yaml logs --tail 30 server
            exit 1
