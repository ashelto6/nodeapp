services:
    server:
        image: ghcr.io/${IMAGE_OWNER:-ashelto6}/nodeapp-server:${IMAGE_TAG:-latest}
        build:
            context: ./server
            dockerfile: Dockerfile
            target: prod
        container_name: ${SERVER_HOST}
        restart: unless-stopped
        environment:
            SERVER_HOST: ${SERVER_HOST}
            SERVER_PORT: ${SERVER_PORT}
            MONGO_HOST: ${MONGO_HOST}
            MONGO_PORT: ${MONGO_PORT}
            MONGO_DB: ${MONGO_DB}
            MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
            MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
            LOG_LEVEL: ${LOG_LEVEL}
            SENTRY_DSN: ${SENTRY_DSN}
        healthcheck:
            # /api/health returns 503 while mongo is down (issue #52's
            # contract), so this container goes unhealthy along with it --
            # deliberate, matches the deploy gate. wget, not curl: that's
            # what alpine actually ships.
            test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:${SERVER_PORT}/api/health']
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 10s

    nginx:
        image: ghcr.io/${IMAGE_OWNER:-ashelto6}/nodeapp-nginx:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: nginx/Dockerfile
            target: prod
        container_name: ${NGINX_HOST}
        restart: unless-stopped
        environment:
            NGINX_HOST: ${NGINX_HOST}
            NGINX_PORT: ${NGINX_PORT}
            SERVER_HOST: ${SERVER_HOST}
            SERVER_PORT: ${SERVER_PORT}
        ports:
            - ${NGINX_PORT}:${NGINX_PORT}
        depends_on:
            # service_started, not service_healthy: nginx serving 502s while
            # the API warms up is more observable than nginx refusing to
            # start at all (issue #118).
            server:
                condition: service_started

    mongo:
        image: mongo:7
        container_name: ${MONGO_HOST}
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
            MONGO_DB: ${MONGO_DB}
            MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
            MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
        volumes:
            - mongo-data:/data/db
            - ./mongo/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            # `ping` is on Mongo's unauthenticated-command allowlist, so this
            # works even with root creds set -- no need to pass auth here.
            test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
            # A fresh volume runs create-app-user.js before mongo reports
            # ready; give it real headroom so first `up` on a new box
            # doesn't flap unhealthy (issue #118).
            start_period: 40s

volumes:
    mongo-data:
