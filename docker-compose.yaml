services:
    server:
        image: ghcr.io/ashelto6/nodeapp-server:latest
        build:
            context: ./server
            dockerfile: Dockerfile
            target: prod
        container_name: ${SERVER_HOST}
        restart: unless-stopped
        env_file: .env
        ports:
            - ${SERVER_PORT}:${SERVER_PORT}

    nginx:
        image: ghcr.io/ashelto6/nodeapp-nginx:latest
        build:
            context: .
            dockerfile: nginx/Dockerfile
            target: prod
        container_name: ${NGINX_HOST}
        restart: unless-stopped
        env_file: .env
        ports:
            - ${NGINX_PORT}:${NGINX_PORT}
        depends_on:
            - server

    mongo:
        image: mongo:7
        container_name: ${MONGO_HOST}
        restart: unless-stopped
        env_file: .env
        volumes:
            - mongo-data:/data/db

volumes:
    mongo-data:
