services:
    server:
        image: ghcr.io/${IMAGE_OWNER:-ashelto6}/nodeapp-server:${IMAGE_TAG:-latest}
        build:
            context: ./server
            dockerfile: Dockerfile
            target: prod
        container_name: ${SERVER_HOST}
        restart: unless-stopped
        env_file: .env

    nginx:
        image: ghcr.io/${IMAGE_OWNER:-ashelto6}/nodeapp-nginx:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: nginx/Dockerfile
            target: prod
        container_name: ${NGINX_HOST}
        restart: unless-stopped
        env_file: .env
        ports:
            - ${NGINX_PORT}:${NGINX_PORT}
        depends_on:
            - server

    mongo:
        image: mongo:7
        container_name: ${MONGO_HOST}
        restart: unless-stopped
        env_file: .env
        volumes:
            - mongo-data:/data/db
            - ./mongo/init:/docker-entrypoint-initdb.d:ro

volumes:
    mongo-data:
